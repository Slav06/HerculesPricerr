<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Email – Hercules Moving Solutions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFA23F 0%, #e8891f 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }
        .card {
            max-width: 520px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            padding: 32px;
        }
        h1 { font-size: 22px; color: #FFA23F; margin-bottom: 8px; }
        p.sub { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 14px; color: #374151; margin-bottom: 6px; }
        input[type="email"], input[type="text"], textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 120px; resize: vertical; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #FFA23F;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #e8891f; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .back { margin-bottom: 20px; }
        .back a { color: white; text-decoration: none; font-size: 14px; opacity: 0.95; }
        .back a:hover { text-decoration: underline; }
        .result {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .result.success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; display: block; }
        .result.error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; display: block; }
    </style>
</head>
<body>
    <div class="back"><a href="/dashboard.html">← Back to Dashboard</a></div>
    <div class="card">
        <h1>📧 Test Resend Email</h1>
        <p class="sub">Send a test email to verify your Resend domain and API.</p>

        <form id="testForm">
            <div class="form-group">
                <label for="to">Send to (your email)</label>
                <input type="email" id="to" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" value="Test from Hercules Moving Solutions" placeholder="Subject">
            </div>
            <div class="form-group">
                <label for="body">Message (HTML)</label>
                <textarea id="body" placeholder="<p>Hello, this is a test.</p>"><p>This is a test email from your Hercules dashboard.</p><p>If you received this, your Resend domain and API are working. ✅</p></textarea>
            </div>
            <button type="submit" class="btn" id="sendBtn">Send test email</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        const form = document.getElementById('testForm');
        const sendBtn = document.getElementById('sendBtn');
        const resultEl = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const to = document.getElementById('to').value.trim();
            const subject = document.getElementById('subject').value.trim() || 'Test from Hercules Moving Solutions';
            const body = document.getElementById('body').value.trim() || '<p>Test email.</p>';

            resultEl.className = 'result';
            resultEl.textContent = '';
            resultEl.style.display = 'none';
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending…';

            try {
                const base = window.location.origin;
                const res = await fetch(base + '/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to, subject, html: body })
                });
                const data = await res.json().catch(() => ({}));

                if (res.ok && data.success) {
                    resultEl.className = 'result success';
                    resultEl.textContent = '✅ Email sent! Check ' + to + ' (and spam folder).';
                } else {
                    resultEl.className = 'result error';
                    resultEl.textContent = '❌ ' + (data.error || data.message || res.statusText || 'Failed to send');
                }
            } catch (err) {
                resultEl.className = 'result error';
                resultEl.textContent = '❌ ' + (err.message || 'Network error');
            }
            resultEl.style.display = 'block';
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send test email';
        });
    </script>
</body>
</html>
