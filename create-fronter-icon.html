<!DOCTYPE html>
<html>
<head>
    <style>
        .icon {
            width: 128px;
            height: 128px;
            background: linear-gradient(135deg, #007bff, #28a745);
            border: 3px solid #fff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .truck {
            font-size: 40px;
            margin-bottom: 5px;
        }
        .text {
            font-size: 16px;
            text-align: center;
            line-height: 1.1;
        }
        .small-text {
            font-size: 10px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="icon">
        <div class="truck">🚛</div>
        <div class="text">FRONTER</div>
        <div class="small-text">JOB TRACKER</div>
    </div>
    
    <script>
        // Instructions for user
        console.log('FRONTER ICON CREATED');
        console.log('Right-click on the icon above and save as PNG');
        console.log('Save as: icon128.png, icon48.png, icon16.png (resize as needed)');
    </script>
</body>
</html>
